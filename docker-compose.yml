services:
  mysql:
    image: mysql:8.0
    container_name: structexam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: structexam123
      MYSQL_DATABASE: structexam
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: structexam-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: structexam-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos"]
      interval: 15s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: structexam-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NACOS_HOST: nacos
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      JWT_SECRET: structexam-secret-key-for-jwt-token-generation
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      user-service:
        condition: service_started
      exam-service:
        condition: service_started
      code-service:
        condition: service_started

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user-service
    container_name: structexam-user-service
    environment:
      NACOS_HOST: nacos
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: structexam123
      REDIS_HOST: redis
      JWT_SECRET: structexam-secret-key-for-jwt-token-generation
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  exam-service:
    build:
      context: .
      dockerfile: Dockerfile.exam-service
    container_name: structexam-exam-service
    environment:
      NACOS_HOST: nacos
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: structexam123
      REDIS_HOST: redis
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  code-service:
    build:
      context: .
      dockerfile: Dockerfile.code-service
    container_name: structexam-code-service
    environment:
      NACOS_HOST: nacos
      MYSQL_HOST: mysql
      MYSQL_PASSWORD: structexam123
      REDIS_HOST: redis
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: structexam-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway

volumes:
  mysql_data:
