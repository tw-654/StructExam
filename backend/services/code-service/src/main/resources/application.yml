server:
  port: 8083
  address: 0.0.0.0

spring:
  application:
    name: code-service
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/structexam?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 5000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.structexam.common.entity
  configuration:
    map-underscore-to-camel-case: true
