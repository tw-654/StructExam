server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
          filters:
            - StripPrefix=1
        - id: exam-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/exam/**
          filters:
            - StripPrefix=1
        - id: code-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/code/**
          filters:
            - StripPrefix=1
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 5000

jwt:
  secret: ${JWT_SECRET:structexam-secret-key-for-jwt-token-generation}
  exclusion:
    - /api/auth/login
    - /api/auth/register
